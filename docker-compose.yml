services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    ports:
      - "2000:2000"
    environment:
      PORT: 2000
      MONGODB_URI: mongodb://mongodb:27017/rolDocs
      SESSION_SECRET: docker-dev-secret-change-me
    depends_on:
      - mongodb
    volumes:
      - ./src/public/uploads:/app/src/public/uploads
    restart: on-failure

volumes:
  mongodb_data:
