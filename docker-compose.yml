services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    ports:
      - "${PORT:-2000}:${PORT:-2000}"
    env_file:
      - .env
    environment:
      # Dentro de Docker la DB no es localhost, es el servicio mongodb
      MONGODB_URI: mongodb://mongodb:27017/rolDocs
    depends_on:
      - mongodb
    volumes:
      - ./src/public/uploads:/app/src/public/uploads
    restart: on-failure

volumes:
  mongodb_data:
